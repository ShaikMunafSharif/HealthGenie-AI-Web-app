name: Selenium E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  selenium-tests:
    name: Run Selenium E2E Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: qa_automation/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r qa_automation/requirements.txt

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Verify Chrome installation
        run: |
          google-chrome --version
          chromedriver --version

      - name: Create report and screenshot directories
        run: |
          mkdir -p qa_automation/reports
          mkdir -p qa_automation/screenshots

      - name: Run Selenium test suite (Chrome headless)
        env:
          PYTHONPATH: qa_automation
          DISPLAY: ':99'
        run: |
          cd $GITHUB_WORKSPACE
          python -m pytest qa_automation/tests/ \
            --browser=chrome \
            --headless \
            --base-url=https://ShaikMunafSharif.github.io/HealthGenie-AI-Web-app \
            -v \
            --tb=short \
            --html=qa_automation/reports/test_report.html \
            --self-contained-html \
            -m "not cross_browser" \
            --timeout=60 \
            2>&1 | tee qa_automation/reports/test_run.log || true

      - name: Generate test summary
        if: always()
        run: |
          echo "## Selenium E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** https://ShaikMunafSharif.github.io/HealthGenie-AI-Web-app" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Browser:** Chrome (headless)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f qa_automation/reports/test_run.log ]; then
            PASSED=$(grep -c "PASSED" qa_automation/reports/test_run.log || echo 0)
            FAILED=$(grep -c "FAILED" qa_automation/reports/test_run.log || echo 0)
            echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload HTML test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-test-report
          path: qa_automation/reports/
          retention-days: 30

      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: selenium-failure-screenshots
          path: qa_automation/screenshots/
          retention-days: 14

      - name: Post PR comment with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let passed = 0, failed = 0;
            try {
              const log = fs.readFileSync('qa_automation/reports/test_run.log', 'utf8');
              passed = (log.match(/PASSED/g) || []).length;
              failed = (log.match(/FAILED/g) || []).length;
            } catch(e) {}
            const total = passed + failed;
            const rate = total > 0 ? Math.round(passed/total*100) : 0;
            const icon = failed === 0 ? '✅' : '⚠️';
            const body = [
              `## ${icon} Selenium E2E Test Results`,
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| **Total Tests** | ${total} |`,
              `| **Passed** | ✅ ${passed} |`,
              `| **Failed** | ❌ ${failed} |`,
              `| **Pass Rate** | ${rate}% |`,
              `| **Browser** | Chrome (headless) |`,
              `| **Target** | https://ShaikMunafSharif.github.io/HealthGenie-AI-Web-app |`,
              '',
              `> Full HTML report available in workflow artifacts.`,
              `> Security test failures are expected (CRIT-01 through CRIT-04 documented).`
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
