name: Selenium E2E Tests Overview

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  selenium-tests:
    name: Generate Test Overview Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate test summary
        run: |
          echo "## Selenium E2E Test Results (Pre-recorded Overview)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** https://ShaikMunafSharif.github.io/HealthGenie-AI-Web-app" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** 2026-06-16" >> $GITHUB_STEP_SUMMARY
          echo "**Browser:** Chrome, Firefox, Edge" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Tests** | 59 |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ **Passed** | 53 |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ **Failed** | 6 (Security Docs) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Pass Rate** | 89.8% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Note: The tests are not re-run in this pipeline. The previous results and test cases are attached as an Excel artifact." >> $GITHUB_STEP_SUMMARY

      - name: Upload Test Report Excel
        uses: actions/upload-artifact@v4
        with:
          name: test-execution-report-excel
          path: qa_automation/reports/Test_Execution_Report.xlsx
          retention-days: 30

      - name: Post PR comment with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              `## 📊 Selenium E2E Test Overview`,
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| **Total Tests** | 59 |`,
              `| **Passed** | ✅ 53 |`,
              `| **Failed** | ❌ 6 |`,
              `| **Pass Rate** | 89.8% |`,
              `| **Browser** | Chrome, Firefox, Edge |`,
              `| **Target** | https://ShaikMunafSharif.github.io/HealthGenie-AI-Web-app |`,
              '',
              `> **Note**: Test execution was bypassed as per request. The detailed test cases and results overview are available as an Excel download in the workflow artifacts.`
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
